services:
  - type: web
    name: healthnexus-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt; python manage.py migrate; python manage.py collectstatic --noinput
    startCommand: gunicorn healthcare.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
